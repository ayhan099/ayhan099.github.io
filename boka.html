<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Priser - Mrs Pärson Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="navbar"></div>

<div class="container my-5">
    <h1 class="text center mb-4">Boka din vistelse</h1>

    <div class="card p-4 mb-4">
        <h4>Välj datum</h4>

        <div class="row">
            <div class="col-md-6">
                <label>Check-in</label>
                <input type="date" id="checkin" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Check-out</label>
                <input type="date" id="checkout" class="form-control">
            </div>
        </div>

        <button onclick="showRooms()" class="btn btn-dark mt-3">Sök rum</button>
    </div>

    <div id="rooms" class="row g-4"></div>

    <div id="extras" class="card p-4 mt-4 d-none">
        <h4>Vill du sätta guldkant på din vistelse?</h4>

        <div class ="form-check">
            <input class="form-check-input" type="checkbox" value="650" id="wine">
            <label class="form-check-label" for="wine">🍾 Mousserande vin & choklad – 650 kr</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="350">
            <label class="form-check-label">⏰ Sen utcheckning – 350 kr</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="400">
            <label class="form-check-label">Hundpaket – 400 kr</label>
        </div>
    </div>

    <div id="form" class="card p-4 mt-4 d-none">
        <h4>Fyll i dina uppgifter</h4>

        <input class="form-control mb-2" placeholder="Namn">
        <input class="form-control mb-2" placeholder="E-post">
        <input class="form-control mb-2" placeholder="Telefonnummer">

        <textarea class="form-control mb-3" placeholder="Önskemål eller frågor"></textarea>

        <button onclick="confirmBooking()" class ="btn btn-success">Kolla mail för yttligare information</button>
    </div>

    <div id="confirmation" class="text-center mt-5 d-none">
        <h4>Din bokning är bekräftad!</h4>
        <p>Vi har skickat en bekräftelse till din e-post. Välkommen att bo hos oss på Mrs Pärson Hotel!</p>
    </div>
</div>

<div id="footer"></div>

<script src="init.js"></script>
<script src="booking.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
